name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and package
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_NOLOGO: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore FDLParser.slnx

      - name: Build and pack NuGet packages
        run: dotnet pack FDLParser/FDLParser.csproj --configuration Release --no-restore --output artifacts

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v5
        with:
          name: FDLParser-NuGet-${{ github.run_number }}
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
          if-no-files-found: error
          retention-days: 30
